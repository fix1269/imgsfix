<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | imgsfix</title>
  <meta name="description" content="The page you were looking for could not be found. Return to the imgsfix homepage to explore our privacy-focused image tools.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <section class="center-stack">
    <div class="container">
      <span class="badge">🧭 <span data-i18n="page_404">Page Not Found</span></span>
      <div class="big">404</div>
      <h1 style="margin-top:var(--s-3)" data-i18n="err404_title">Oops! This Page Got Lost</h1>
      <p style="color:var(--text-muted);max-width:48ch;margin:var(--s-3) auto var(--s-5)" data-i18n="err404_desc">
        The page you are looking for might have been moved, renamed, or never existed. But do not worry — your images are safe, and our tools are just a click away.
      </p>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        <a class="btn btn-primary btn-lg" href="../index.html" data-i18n="go_home">Go Home</a>
        <a class="btn btn-secondary btn-lg" href="../index.html#tools" data-i18n="cta_browse">Browse Tools</a>
      </div>
      <nav class="breadcrumb" aria-label="Breadcrumb" style="margin-top:var(--s-6)">
        <a href="../index.html" data-i18n="bc_home">Home</a><span class="sep">/</span>
        <span data-i18n="page_404">Page Not Found</span>
      </nav>
    </div>
  </section>

  <script src="../js/main.js"></script>
</body>
</html>
