<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enhance Image — imgsfix</title>
  <meta name="description" content="Adjust brightness, contrast, saturation, and sharpness. 100% local browser processing.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <section class="page-head">
    <div class="container">
      <span class="badge">✨ <span data-i18n="t_enhance_t">Enhance</span></span>
      <h1 data-i18n="t_enhance_t">Enhance</h1>
      <p data-i18n="t_enhance_d">Adjust brightness, contrast, sharpness.</p>
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="../../index.html" data-i18n="bc_home">Home</a><span class="sep">/</span>
        <a href="../../index.html#tools" data-i18n="nav_tools">Tools</a><span class="sep">/</span>
        <span data-i18n="t_enhance_t">Enhance</span>
      </nav>
    </div>
  </section>

  <section class="section-sm">
    <div class="container tool-shell">
      <aside class="tool-panel">
        <div class="panel-section">
          <h4 data-i18n="tc_enhance_settings">Enhance Settings</h4>
          <div class="setting-row">
            <label><span data-i18n="tc_brightness">Brightness:</span> <span id="briVal">100</span></label>
            <input type="range" id="brightness" class="range-input" min="0" max="200" value="100">
          </div>
          <div class="setting-row">
            <label><span data-i18n="tc_contrast">Contrast:</span> <span id="conVal">100</span></label>
            <input type="range" id="contrast" class="range-input" min="0" max="200" value="100">
          </div>
          <div class="setting-row">
            <label><span data-i18n="tc_saturation">Saturation:</span> <span id="satVal">100</span></label>
            <input type="range" id="saturation" class="range-input" min="0" max="200" value="100">
          </div>
          <div class="setting-row">
            <label><span data-i18n="tc_sharpness">Sharpness:</span> <span id="shpVal">0</span></label>
            <input type="range" id="sharpness" class="range-input" min="0" max="100" value="0">
          </div>
          <button class="btn btn-primary btn-block" id="btnApply" style="margin-top:8px" data-i18n="tc_apply">Apply</button>
        </div>
      </aside>

      <div class="tool-stage" id="toolStage">
        <div class="tool-stage-header">
          <h3 data-i18n="t_enhance_t">Enhance</h3>
          <div class="result-actions" id="resultActions" style="display:none">
            <button class="btn btn-primary btn-sm" id="btnDownload" data-i18n="tc_download">Download</button>
            <button class="btn btn-secondary btn-sm" id="btnClear" data-i18n="tc_clear">Clear</button>
            <button class="btn btn-secondary btn-sm" id="btnReset" data-i18n="tc_reset">Reset</button>
          </div>
        </div>
        <div class="tool-stage-body">
          <div class="empty-state" id="emptyState">
            <div class="es-icon">✨</div>
            <p data-i18n="tc_drop">Drop your image here or click to browse</p>
            <p style="font-size:12px;color:var(--text-faint)" data-i18n="tc_supported">JPG · PNG · WebP · GIF · BMP</p>
            <button class="btn btn-primary btn-sm" id="btnUpload" data-i18n="t_upload">رفع صورة</button>
          </div>
          <div class="ba-wrap hide" id="baWrap">
            <canvas id="beforeCanvas"></canvas>
            <div class="ba-clip" style="width:50%">
              <canvas id="afterCanvas"></canvas>
            </div>
            <div class="ba-slider" style="left:50%"></div>
            <div class="ba-handle">⇆</div>
            <span class="ba-label ba-label-before" data-i18n="tc_original">Before</span>
            <span class="ba-label ba-label-after" data-i18n="tc_result">After</span>
          </div>
          <input type="file" id="fileInput" accept="image/*" class="hide">
          <div class="drop-zone hide" id="dropZone" style="margin-top:16px">
            <span class="dz-icon">📁</span>
            <span data-i18n="tc_drop">Drop your image here or click to browse</span>
          </div>
          <div class="progress hide" id="progress" style="max-width:400px">
            <div class="progress-bar"></div>
            <div class="progress-text" id="progressText"></div>
          </div>
          <div id="infoBar" style="font-size:13px;color:var(--text-faint)"></div>
        </div>
      </div>
    </div>
  </section>

  <script src="../../js/main.js"></script>
  <script src="../../js/tool-core.js"></script>
  <script>
  (function(){
    var briEl=document.getElementById('brightness'),briVal=document.getElementById('briVal');
    var conEl=document.getElementById('contrast'),conVal=document.getElementById('conVal');
    var satEl=document.getElementById('saturation'),satVal=document.getElementById('satVal');
    var shpEl=document.getElementById('sharpness'),shpVal=document.getElementById('shpVal');
    var applyBtn=document.getElementById('btnApply');
    var btnUpload=document.getElementById('btnUpload');

    function resetSliders(){
      briEl.value=100;briVal.textContent=100;
      conEl.value=100;conVal.textContent=100;
      satEl.value=100;satVal.textContent=100;
      shpEl.value=0;shpVal.textContent=0;
    }

    briEl.addEventListener('input',function(){briVal.textContent=briEl.value;});
    conEl.addEventListener('input',function(){conVal.textContent=conEl.value;});
    satEl.addEventListener('input',function(){satVal.textContent=satEl.value;});
    shpEl.addEventListener('input',function(){shpVal.textContent=shpEl.value;});

    var tool=initTool({
      autoProcess:false,
      onReset:function(){resetSliders();},
      onClear:function(){resetSliders();}
    });

    if(btnUpload)btnUpload.addEventListener('click',function(){
      document.getElementById('fileInput').click();
    });

    function redraw(){
      var orig=tool.getOriginal(); if(!orig)return;
      var ac=tool.getAfterCanvas(),actx=ac.getContext('2d');
      ac.width=orig.width; ac.height=orig.height;
      var b=+briEl.value,c=+conEl.value,s=+satEl.value,sh=+shpEl.value;
      actx.clearRect(0,0,ac.width,ac.height);
      actx.filter='brightness('+b+'%) contrast('+c+'%) saturate('+s+'%)';
      actx.drawImage(orig,0,0);
      actx.filter='none';
      /* convolution sharpen */
      if(sh>0){
        var w=ac.width,h=ac.height;
        var src=actx.getImageData(0,0,w,h);
        var sd=src.data;
        var out=actx.createImageData(w,h);
        var od=out.data;
        var a=sh/100,center=1+4*a,side=-a;
        for(var y=0;y<h;y++){
          for(var x=0;x<w;x++){
            var idx=(y*w+x)*4;
            if(y===0||y===h-1||x===0||x===w-1){
              od[idx]=sd[idx];od[idx+1]=sd[idx+1];od[idx+2]=sd[idx+2];od[idx+3]=sd[idx+3];
              continue;
            }
            for(var ch=0;ch<3;ch++){
              var i=idx+ch;
              od[i]=sd[i-w*4]*side+sd[i-4]*side+sd[i]*center+sd[i+4]*side+sd[i+w*4]*side;
            }
            od[idx+3]=sd[idx+3];
          }
        }
        actx.putImageData(out,0,0);
      }
    }

    applyBtn.addEventListener('click',function(){
      redraw();
      imgsfix.toast(imgsfix.t('tc_done'),'ok');
    });
  })();
  </script>
</body>
</html>
