<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compress Image — imgsfix</title>
  <meta name="description" content="Shrink image file size while keeping quality. 100% local browser processing.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <section class="page-head">
    <div class="container">
      <span class="badge">📦 <span data-i18n="t_compress_t">Compress</span></span>
      <h1 data-i18n="t_compress_t">Compress</h1>
      <p data-i18n="t_compress_d">Shrink image file size while keeping quality.</p>
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="../../index.html" data-i18n="bc_home">Home</a><span class="sep">/</span>
        <a href="../../index.html#tools" data-i18n="nav_tools">Tools</a><span class="sep">/</span>
        <span data-i18n="t_compress_t">Compress</span>
      </nav>
    </div>
  </section>

  <section class="section-sm">
    <div class="container tool-shell">
      <aside class="tool-panel">
        <div class="panel-section">
          <h4 data-i18n="tc_compress_settings">Compress Settings</h4>
          <div class="setting-row">
            <label><span data-i18n="tc_quality">Quality:</span> <span id="qualityVal">80</span>%</label>
            <input type="range" id="quality" class="range-input" min="10" max="100" value="80">
          </div>
          <div class="setting-row">
            <label data-i18n="tc_max_width">Max Width (px)</label>
            <input type="number" id="maxWidth" class="num-input" min="1" value="1920">
          </div>
          <button class="btn btn-primary btn-block" id="btnApply" style="margin-top:8px" data-i18n="t_compress_t">Compress</button>
        </div>
        <div class="panel-section" id="sizeInfo" style="display:none">
          <h4 data-i18n="tc_size">Size</h4>
          <div class="setting-row" style="display:flex;justify-content:space-between;font-size:13px">
            <span data-i18n="tc_before">Before</span><span id="sizeBefore">—</span>
          </div>
          <div class="setting-row" style="display:flex;justify-content:space-between;font-size:13px">
            <span data-i18n="tc_after">After</span><span id="sizeAfter">—</span>
          </div>
          <div class="setting-row" style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;color:var(--c-success-500)">
            <span data-i18n="tc_saved">Saved</span><span id="sizeSaved">—</span>
          </div>
        </div>
      </aside>

      <div class="tool-stage" id="toolStage">
        <div class="tool-stage-header">
          <h3 data-i18n="t_compress_t">Compress</h3>
          <div class="result-actions" id="resultActions" style="display:none">
            <button class="btn btn-primary btn-sm" id="btnDownload" data-i18n="tc_download">Download</button>
            <button class="btn btn-secondary btn-sm" id="btnClear" data-i18n="tc_clear">Clear</button>
            <button class="btn btn-secondary btn-sm" id="btnReset" data-i18n="tc_reset">Reset</button>
          </div>
        </div>
        <div class="tool-stage-body">
          <div class="empty-state" id="emptyState">
            <div class="es-icon"></div>
            <p data-i18n="tc_drop">Drop your image here or click to browse</p>
            <p style="font-size:12px;color:var(--text-faint)" data-i18n="tc_supported">JPG · PNG · WebP · GIF · BMP</p>
            <button class="btn btn-primary btn-sm" id="btnUpload" data-i18n="t_upload">رفع صورة</button>
          </div>
          <div class="ba-wrap hide" id="baWrap">
            <canvas id="beforeCanvas"></canvas>
            <div class="ba-clip" style="width:50%">
              <canvas id="afterCanvas"></canvas>
            </div>
            <div class="ba-slider" style="left:50%"></div>
            <div class="ba-handle">⇆</div>
            <span class="ba-label ba-label-before" data-i18n="tc_original">Before</span>
            <span class="ba-label ba-label-after" data-i18n="tc_result">After</span>
          </div>
          <input type="file" id="fileInput" accept="image/*" class="hide">
          <div class="drop-zone hide" id="dropZone" style="margin-top:16px">
            <span class="dz-icon"></span>
            <span data-i18n="tc_drop">Drop your image here or click to browse</span>
          </div>
          <div class="progress hide" id="progress" style="max-width:400px">
            <div class="progress-bar"></div>
            <div class="progress-text" id="progressText"></div>
          </div>
          <div id="infoBar" style="font-size:13px;color:var(--text-faint)"></div>
        </div>
      </div>
    </div>
  </section>

  <script src="../../js/main.js"></script>
  <script type="module" src="../../js/compress.js"></script>
</body>
</html>
