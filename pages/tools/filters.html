<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Filters — imgsfix</title>
  <meta name="description" content="Apply stylized filters with intensity control. 12 presets, 100% local browser processing.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    .filter-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:var(--s-3);}
    .filter-thumb{position:relative;border:2px solid var(--border-soft);border-radius:var(--r-sm);overflow:hidden;cursor:pointer;transition:border-color var(--t-fast) var(--ease),transform var(--t-fast) var(--ease);background:var(--bg-subtle);}
    .filter-thumb:hover{transform:translateY(-2px);}
    .filter-thumb.active{border-color:var(--c-primary-500);box-shadow:0 0 0 3px rgba(26,95,255,.18);}
    .filter-thumb canvas,.filter-thumb img{display:block;width:100%;height:64px;object-fit:cover;}
    .filter-thumb .ft-label{position:absolute;bottom:0;left:0;right:0;padding:3px 6px;font-size:10px;font-weight:700;color:#fff;background:rgba(0,0,0,.5);text-align:center;text-transform:uppercase;letter-spacing:.04em;}
    .filter-preview-wrap{position:relative;width:100%;max-width:720px;border-radius:var(--r-md);overflow:hidden;border:1px solid var(--border-soft);background:var(--bg-subtle);}
    .filter-preview-wrap img{display:block;width:100%;}
  </style>
  <link rel="stylesheet" crossorigin href="../../assets/style-CScObT-4.css">
</head>
<body>
  <section class="page-head">
    <div class="container">
      <span class="badge">🎞 <span data-i18n="t_filters_t">Filters</span></span>
      <h1 data-i18n="t_filters_t">Filters</h1>
      <p data-i18n="t_filters_d">Apply stylized filters with intensity.</p>
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="../../index.html" data-i18n="bc_home">Home</a><span class="sep">/</span>
        <a href="../../index.html#tools" data-i18n="nav_tools">Tools</a><span class="sep">/</span>
        <span data-i18n="t_filters_t">Filters</span>
      </nav>
    </div>
  </section>

  <section class="section-sm">
    <div class="container tool-shell">
      <aside class="tool-panel">
        <div class="panel-section">
          <h4 data-i18n="tc_filters_settings">Filter Presets</h4>
          <div class="filter-grid" id="filterGrid"></div>
          <div class="setting-row">
            <label><span data-i18n="tc_intensity">Intensity:</span> <span id="intVal">100</span>%</label>
            <input type="range" id="intensity" class="range-input" min="0" max="100" value="100">
          </div>
          <button class="btn btn-secondary btn-block" id="btnNoFilter" style="margin-bottom:8px" data-i18n="tc_no_filter">No Filter</button>
          <button class="btn btn-primary btn-block" id="btnApply" style="margin-top:8px" data-i18n="tc_apply">Apply</button>
        </div>
      </aside>

      <div class="tool-stage" id="toolStage">
        <div class="tool-stage-header">
          <h3 data-i18n="t_filters_t">Filters</h3>
          <div class="result-actions" id="resultActions" style="display:none">
            <button class="btn btn-primary btn-sm" id="btnDownload" data-i18n="tc_download">Download</button>
            <button class="btn btn-secondary btn-sm" id="btnClear" data-i18n="tc_clear">Clear</button>
            <button class="btn btn-secondary btn-sm" id="btnReset" data-i18n="tc_reset">Reset</button>
          </div>
        </div>
        <div class="tool-stage-body">
          <div class="empty-state" id="emptyState">
            <div class="es-icon"></div>
            <p data-i18n="tc_drop">Drop your image here or click to browse</p>
            <p style="font-size:12px;color:var(--text-faint)" data-i18n="tc_supported">JPG · PNG · WebP · GIF · BMP</p>
            <button class="btn btn-primary btn-sm" id="btnUpload" data-i18n="t_upload">رفع صورة</button>
          </div>
          <div class="filter-preview-wrap hide" id="previewWrap">
            <img id="previewImg" alt="Filter preview">
          </div>
          <input type="file" id="fileInput" accept="image/*" class="hide">
          <div class="drop-zone hide" id="dropZone" style="margin-top:16px">
            <span class="dz-icon"></span>
            <span data-i18n="tc_drop">Drop your image here or click to browse</span>
          </div>
          <div class="progress hide" id="progress" style="max-width:400px">
            <div class="progress-bar"></div>
            <div class="progress-text" id="progressText"></div>
          </div>
          <div id="infoBar" style="font-size:13px;color:var(--text-faint)"></div>
        </div>
      </div>
    </div>
  </section>

  <script src="../../js/main.js"></script>
  <script>
  (function(){
    'use strict';
    var I=window.imgsfix,$=I.$,t=I.t,toast=I.toast;

    /* ----- upload SVG ----- */
    var uploadIcon=window.imgsfixUploadIcon||
      '<svg class="ic-upload" viewBox="0 0 24 24" width="48" height="48" fill="none" '+
      'stroke="currentColor" stroke-width="1.8" stroke-linecap="round" '+
      'stroke-linejoin="round" aria-hidden="true"><path d="M12 16V4"/>'+
      '<path d="M7 9l5-5 5 5"/><path d="M5 20h14"/></svg>';

    /* ----- DOM ----- */
    var filterGrid=$('#filterGrid');
    var intensity=$('#intensity'),intVal=$('#intVal');
    var btnApply=$('#btnApply'),btnNoFilter=$('#btnNoFilter');
    var btnDownload=$('#btnDownload'),btnReset=$('#btnReset'),btnClear=$('#btnClear'),btnUpload=$('#btnUpload');
    var emptyState=$('#emptyState'),dropZone=$('#dropZone'),previewWrap=$('#previewWrap');
    var previewImg=$('#previewImg');
    var fileInput=$('#fileInput'),progress=$('#progress'),progressText=$('#progressText');
    var resultActions=$('#resultActions'),infoBar=$('#infoBar');

    /* inject upload icon */
    var esIcon=$('.es-icon',emptyState),dzIcon=$('.dz-icon',dropZone);
    if(esIcon)esIcon.innerHTML=uploadIcon;
    if(dzIcon)dzIcon.innerHTML=uploadIcon;

    /* ----- 12 filter definitions -----
       Each filter is a function(intensity 0..1) → a CSS filter string.
       At intensity 0 every filter should collapse to 'none' (original). */
    var FILTERS=[
      {name:'Original',  fn:function(){return 'none';}},
      {name:'Grayscale', fn:function(k){return 'grayscale('+(k*100)+'%)';}},
      {name:'Sepia',     fn:function(k){return 'sepia('+(k*100)+'%)';}},
      {name:'Vintage',   fn:function(k){return 'sepia('+(k*60)+'%) contrast('+(85+k*15)+'%) brightness('+(95+k*5)+'%) saturate('+(80+k*20)+'%)';}},
      {name:'Cool',      fn:function(k){return 'hue-rotate('+(k*180)+'deg) saturate('+(100+k*30)+'%)';}},
      {name:'Warm',      fn:function(k){return 'sepia('+(k*30)+'%) saturate('+(120+k*40)+'%) hue-rotate(-'+(k*15)+'deg)';}},
      {name:'Vivid',     fn:function(k){return 'saturate('+(140+k*120)+'%) contrast('+(100+k*20)+'%)';}},
      {name:'Noir',      fn:function(k){return 'grayscale('+(k*100)+'%) contrast('+(120+k*40)+'%) brightness('+(90+k*10)+'%)';}},
      {name:'Faded',     fn:function(k){return 'brightness('+(100+k*15)+'%) saturate('+(100-k*50)+'%) contrast('+(90-k*10)+'%)';}},
      {name:'Invert',    fn:function(k){return 'invert('+(k*100)+'%)';}},
      {name:'Blur',      fn:function(k){return 'blur('+(k*6)+'px)';}},
      {name:'Sharpen',   fn:function(k){return 'contrast('+(100+k*30)+'%)';}}
    ];

    /* ----- state ----- */
    var originalImage=null;
    var objectURL=null;
    var currentFileName='image.png';
    var activeFilter=0;       /* index into FILTERS */
    var thumbObjects=[];      /* [{canvas,ctx}] for each thumbnail */

    /* ----- helpers ----- */
    function formatSize(bytes){
      if(bytes<1024)return bytes+'B';
      if(bytes<1048576)return(bytes/1024).toFixed(1)+'KB';
      return(bytes/1048576).toFixed(2)+'MB';
    }
    function showProgress(pct,label){
      var bar=$('.progress-bar',progress);
      if(bar)bar.style.width=pct+'%';
      if(progressText)progressText.textContent=label;
    }
    function validateFile(file){
      if(!file)return false;
      if(!file.type.startsWith('image/')){toast(t('tc_supported')+' only','err');return false;}
      if(file.size>50*1024*1024){toast('File too large (max 50MB)','err');return false;}
      return true;
    }
    function getActiveFilter(){
      var k=+intensity.value/100;
      return FILTERS[activeFilter].fn(k);
    }

    /* ----- build the 12 thumbnails ----- */
    function buildThumbnails(){
      filterGrid.innerHTML='';
      thumbObjects=[];
      FILTERS.forEach(function(f,i){
        var thumb=document.createElement('div');
        thumb.className='filter-thumb'+(i===0?' active':'');
        thumb.setAttribute('role','button');
        thumb.setAttribute('tabindex','0');
        thumb.innerHTML='<canvas></canvas><span class="ft-label">'+f.name+'</span>';
        thumb.addEventListener('click',function(){selectFilter(i);});
        thumb.addEventListener('keydown',function(e){
          if(e.key==='Enter'||e.key===' '){e.preventDefault();selectFilter(i);}
        });
        filterGrid.appendChild(thumb);
        var cv=$('canvas',thumb);
        thumbObjects.push({canvas:cv,ctx:cv.getContext('2d'),el:thumb});
      });
    }

    function selectFilter(i){
      activeFilter=i;
      thumbObjects.forEach(function(o,idx){o.el.classList.toggle('active',idx===i);});
      /* live-preview the main image immediately */
      applyPreviewFilter();
    }

    /* draw a filter onto a canvas (used by thumbnails + download) */
    function drawFiltered(canvas,ctx,filterStr){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.filter=filterStr;
      ctx.drawImage(originalImage,0,0,canvas.width,canvas.height);
      ctx.filter='none';
    }

    /* render the 12 thumbnail previews */
    function renderThumbnails(){
      if(!originalImage)return;
      var tw=120,th=64;
      /* scale thumb dims to image aspect ratio */
      var ar=originalImage.width/originalImage.height;
      var tw2=th*ar, th2=th;
      thumbObjects.forEach(function(o,i){
        o.canvas.width=tw2;o.canvas.height=th2;
        drawFiltered(o.canvas,o.ctx,FILTERS[i].fn(1));
      });
    }

    function applyPreviewFilter(){
      if(!originalImage)return;
      previewImg.style.filter=getActiveFilter();
    }

    /* ----- RULE 2: wipe metadata before a fresh load ----- */
    function wipeMetadata(){
      activeFilter=0;
      intensity.value=100;intVal.textContent=100;
      thumbObjects.forEach(function(o,i){o.el.classList.toggle('active',i===0);});
      previewImg.style.filter='none';
    }

    /* ----- RULE 1: load file ----- */
    function loadFile(file){
      if(!validateFile(file))return;
      wipeMetadata();
      if(objectURL){try{URL.revokeObjectURL(objectURL);}catch(e){}objectURL=null;}

      currentFileName=file.name||'image.png';
      objectURL=URL.createObjectURL(file);

      var img=new Image();
      img.onload=function(){
        originalImage=img;
        emptyState.classList.add('hide');
        dropZone.classList.add('hide');
        previewWrap.classList.remove('hide');
        resultActions.classList.remove('hide');
        resultActions.style.display='';
        if(progress)progress.classList.add('hide');

        previewImg.src=objectURL;
        previewImg.style.filter='none';
        if(infoBar)infoBar.textContent=img.width+' × '+img.height+'px · '+formatSize(file.size);

        renderThumbnails();
      };
      img.onerror=function(){toast('Failed to load image','err');clearAll();};
      img.src=objectURL;
    }

    /* ----- RULE 3: reset (restore defaults, keep image) ----- */
    function resetState(){
      activeFilter=0;
      intensity.value=100;intVal.textContent=100;
      thumbObjects.forEach(function(o,i){o.el.classList.toggle('active',i===0);});
      previewImg.style.filter='none';
      toast(t('tc_reset'),'ok');
    }

    /* ----- RULE 3: clear (HARD RESET) ----- */
    function clearAll(){
      if(objectURL){try{URL.revokeObjectURL(objectURL);}catch(e){}objectURL=null;}
      originalImage=null;currentFileName='image.png';activeFilter=0;

      previewImg.src='';previewImg.style.filter='none';
      thumbObjects.forEach(function(o){
        o.ctx.clearRect(0,0,o.canvas.width,o.canvas.height);
        o.canvas.width=0;o.canvas.height=0;
        o.el.classList.remove('active');
      });
      thumbObjects[0].el.classList.add('active');

      previewWrap.classList.add('hide');
      if(progress)progress.classList.add('hide');
      resultActions.classList.add('hide');resultActions.style.display='none';
      dropZone.classList.add('hide');
      emptyState.classList.remove('hide');
      if(infoBar)infoBar.textContent='';

      intensity.value=100;intVal.textContent=100;
      if(fileInput)fileInput.value='';
    }

    /* ----- intensity slider live update ----- */
    intensity.addEventListener('input',function(){
      intVal.textContent=intensity.value;
      applyPreviewFilter();
    });

    /* ----- No Filter button ----- */
    btnNoFilter.addEventListener('click',function(){selectFilter(0);});

    /* ----- Apply: render the active filter to the preview ----- */
    btnApply.addEventListener('click',function(){
      if(!originalImage){toast('Load an image first','err');return;}
      applyPreviewFilter();
      toast(t('tc_done'),'ok');
    });

    /* ----- Download via canvas with ctx.filter ----- */
    btnDownload.addEventListener('click',function(){
      if(!originalImage){toast('Load an image first','err');return;}
      if(progress)progress.classList.remove('hide');
      showProgress(0,t('tc_processing'));
      var canvas=document.createElement('canvas');
      canvas.width=originalImage.width;canvas.height=originalImage.height;
      var ctx=canvas.getContext('2d');
      drawFiltered(canvas,ctx,getActiveFilter());
      showProgress(100,t('tc_done'));
      canvas.toBlob(function(blob){
        if(!blob){toast('Export failed','err');if(progress)progress.classList.add('hide');return;}
        var url=URL.createObjectURL(blob);
        var a=document.createElement('a');
        a.href=url;
        a.download=currentFileName.replace(/\.[^.]+$/,'')+'_filter_imgsfix.png';
        a.click();
        setTimeout(function(){URL.revokeObjectURL(url);},1000);
        setTimeout(function(){if(progress)progress.classList.add('hide');},800);
        toast(t('tc_done'),'ok');
      },'image/png');
    });

    btnReset.addEventListener('click',resetState);
    btnClear.addEventListener('click',clearAll);

    /* ----- upload entry points ----- */
    if(emptyState){
      emptyState.addEventListener('click',function(){fileInput.click();});
      emptyState.addEventListener('dragover',function(e){e.preventDefault();emptyState.classList.add('drag');});
      emptyState.addEventListener('dragleave',function(){emptyState.classList.remove('drag');});
      emptyState.addEventListener('drop',function(e){e.preventDefault();emptyState.classList.remove('drag');if(e.dataTransfer.files&&e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0]);});
    }
    if(dropZone){
      dropZone.addEventListener('click',function(){fileInput.click();});
      dropZone.addEventListener('dragover',function(e){e.preventDefault();dropZone.classList.add('drag');});
      dropZone.addEventListener('dragleave',function(){dropZone.classList.remove('drag');});
      dropZone.addEventListener('drop',function(e){e.preventDefault();dropZone.classList.remove('drag');if(e.dataTransfer.files&&e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0]);});
    }
    if(btnUpload)btnUpload.addEventListener('click',function(){fileInput.click();});
    fileInput.addEventListener('change',function(e){if(e.target.files&&e.target.files[0])loadFile(e.target.files[0]);});
    document.addEventListener('paste',function(e){if(e.clipboardData&&e.clipboardData.files&&e.clipboardData.files[0])loadFile(e.clipboardData.files[0]);});

    /* ----- build thumbnails on init ----- */
    buildThumbnails();
  })();
  </script>
</body>
</html>
